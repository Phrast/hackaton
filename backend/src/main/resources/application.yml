spring:
  datasource:
    url: ${DB_URL:jdbc:postgresql://localhost:5432/carbontrack}
    username: ${DB_USER:carbontrack}
    password: ${DB_PASSWORD:carbontrack}
    driver-class-name: org.postgresql.Driver
  jpa:
    hibernate:
      ddl-auto: validate
    show-sql: false
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
        format_sql: true
  flyway:
    enabled: true
    locations: classpath:db/migration
    baseline-on-migrate: true

server:
  port: ${PORT:8080}
  servlet:
    context-path: /

jwt:
  secret: ${JWT_SECRET:carbontrack-secret-key-must-be-at-least-256-bits-long-for-hs256}
  expiration: ${JWT_EXPIRATION:86400000}

cors:
  allowed-origins: ${CORS_ORIGINS:http://localhost:3000,http://localhost:19006}

springdoc:
  api-docs:
    path: /api-docs
  swagger-ui:
    path: /swagger-ui.html

logging:
  level:
    com.capgemini.carbontrack: INFO
    org.springframework.security: WARN
